        display_name: Seu nome completo ou apelido, por exemplo.
        fields: Seu site, conjunto de linguagem, gênero ou qualquer coisa que quiser.
        indexable: Seus brilhos públicos podem aparecer em resultados de busca. As pessoas que interagiram com suas publicações podem conseguir pesquisá-las independentemente disso.
        note: 'Você pode @mencionar outras contas ou usar #hashtags.'
        show_collections: As pessoas podem ver quem você acompanha e quem acompanha você. Os perfis que você acompanhar saberão disto independentemente do que você selecionar.
        unlocked: Outres podem acompanhar sua conta sem solicitar aprovação. Desmarque caso você queira revisar as solicitações de acompanhamento.
      account_alias:
        acct: Especifique o nome@domínio da conta da qual você deseja se mudar
      account_migration:
        acct: Especifique o nome@domínio da conta para a qual você deseja se mudar
      account_warning_preset:
        text: Você pode usar a sintaxe de brilhos, como links, hashtags e menções
