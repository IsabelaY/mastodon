        trendable_by_default: Pular a revisão manual do conteúdo em alta. Itens individuais ainda poderão ser removidos dos itens em alta após a sua exibição.
        trends: Em alta mostra quais publicações, hashtags e notícias estão ganhando destaque em seu servidor.
