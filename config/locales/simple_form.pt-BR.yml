        include_statuses: E usuárie verá quais brilhos causaram o aviso ou ação da moderação
        send_email_notification: E usuárie receberá uma explicação do que aconteceu com a própria conta
        text_html: Opcional. Você pode usar a sintaxe de brilhos e também pode <a href="%{path}">adicionar avisos pré-definidos</a> para poupar tempo
        type_html: Decida o que fazer com <strong>%{acct}</strong>
        types:
          disable: Impede e usuárie de usar a conta, porém sem excluí-la ou suspendê-la.
          none: Use isto para enviar uma advertência ae usuárie, sem nenhuma outra ação.
          sensitive: Marca todas as mídias de usuárie como sensíveis.
          silence: Impede e usuárie de postar publicamente, restringe suas publicações e notificações a somente quem acompanha sua conta. Encerra todas as denúncias contra esta conta.
          suspend: Impede qualquer interação de ou para esta conta e exclui seu conteúdo. Reversível dentro de 30 dias. Encerra todas as denúncias contra esta conta.
        warning_preset_id: Opcional. Você pode adicionar texto personalizado no final da advertência pré-definida
