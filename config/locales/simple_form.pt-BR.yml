        ends_at: Opcional. O anúncio sairá do ar automaticamente
        scheduled_at: Deixe em branco para publicar o anúncio imediatamente
        starts_at: Opcional. Caso o anúncio esteja vinculado a um período específico
        text: Você pode usar a sintaxe de brilhos. Esteja ciente do espaço que o anúncio ocupará na tela de usuárie
      appeal:
        text: Você só pode recorrer uma vez
      defaults:
        autofollow: Pessoas que criarem contas através de seus convites acompanharão sua conta automaticamente
