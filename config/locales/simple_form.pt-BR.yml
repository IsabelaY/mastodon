        setting_aggregate_reblogs: Não mostrar novos reflexos para brilhos que foram refletidos recentemente (afeta somente os reflexos mais recentes)
        setting_always_send_emails: Normalmente, as notificações por e-mail não serão enviadas enquanto você estiver usando ativamente sua conta
        setting_boost_modal: Ao ativar esta opção, será aberta uma caixa de diálogo de confirmação onde você poderá alterar a visibilidade do seu reflexo e confirmar se você quer mesmo compartilhar cada publicação.
        setting_default_quote_policy_private: Brilhos limitados a quem acompanha não podem ser citados por outras contas.
        setting_default_quote_policy_unlisted: Quando outras pessoas citarem você, os brilhos delas também ficarão ocultas das linhas do tempo públicas.
        setting_default_sensitive: Mídia sensível está oculta por padrão e pode ser revelada com um clique
        setting_display_media_default: Sempre ocultar mídia sensível
        setting_display_media_hide_all: Sempre ocultar todas as mídias
        setting_display_media_show_all: Sempre mostrar mídia sensível
        setting_emoji_style: Como exibir emojis. "Automático" tentará usar emojis do seu sistema, mas voltará para Twemoji em navegadores antigos.
        setting_quick_boosting_html: Ao ativar esta opção, clicar no ícone de reflexo %{boost_icon} compartilhará imediatamente o brilho, ao invés de abrir o menu suspenso de reflexo/citação. Move a ação de citação para o menu %{options_icon} (Opções).
        setting_system_scrollbars_ui: Se aplica apenas para navegadores de computador baseado no Safari e Chrome
        setting_use_blurhash: O borrão é baseado nas cores da imagem oculta, esconde a maioria dos detalhes
        setting_use_pending_items: Ocultar atualizações da linha do tempo atrás de um clique ao invés de rolar automaticamente
        username: Você pode usar letras, números e underlines
        whole_word: Quando a palavra-chave ou frase é inteiramente alfanumérica, ela será aplicada somente se corresponder a palavra inteira
      domain_allow:
        domain: Este domínio poderá obter dados deste servidor e os dados recebidos dele serão processados e armazenados
      email_domain_block:
        domain: Este pode ser o nome de domínio que aparece no endereço de e-mail ou no registro MX que ele utiliza. Ele será verificado no momento do registro da conta.
        with_dns_records: Será feita uma tentativa de resolver os registros DNS do domínio em questão e os resultados também serão colocados na lista de bloqueios
      featured_tag:
        name: 'Aqui estão algumas hashtags usadas recentemente:'
      filters:
        action: Escolher qual ação executar quando uma publicação corresponder ao filtro
        actions:
          blur: Oculte a mídia com um aviso, porém mantenha o texto visível
          hide: Esconder completamente o conteúdo filtrado, comportando-se como se ele não existisse
          warn: Ocultar o conteúdo filtrado por trás de um aviso mencionando o título do filtro
      form_admin_settings:
        activity_api_enabled: Contagem de brilhos locais, usuáries atives e noves usuáries semanais
        app_icon: WEBP, PNG, GIF ou JPG. Sobrescreve o ícone padrão do aplicativo em dispositivos móveis com um ícone personalizado.
        backups_retention_period: Es usuáries podem gerar arquivos de seus brilhos para baixar mais tarde. Quando o valor é positivo, esses arquivos serão automaticamente excluídos do seu armazenamento após o número especificado de dias.
        bootstrap_timeline_accounts: Estas contas serão fixadas no topo das recomendações de noves usuáries para acompanhar.
        closed_registrations_message: Exibida quando as inscrições estiverem fechadas
        content_cache_retention_period: Todas as publicações de outros servidores (incluindo boosts e respostas) serão excluídas após o número especificado de dias, sem levar a qualquer interação de usuárie local com tais publicações. Isto inclui publicações marcadas como favoritas por usuáries locais. Mensagens diretas entre usuáries de diferentes servidores também serão perdidas e impossíveis de restaurar. O uso desta configuração destina-se a servidores com propósitos específicos e pode quebrar expectativas des usuáries comuns quando implementadas em servidores de uso genérico.
        custom_css: Você pode aplicar estilos personalizados na versão web do Hometown.
        favicon: WEBP, PNG, GIF ou JPG. Sobrescreve o favicon padrão do Hometown com um ícone personalizado.
        landing_page: Seleciona a página que noves visitantes veem ao acessar seu servidor pela primeira vez. Se você selecionar "Em alta", tal função precisa estar ativada nas Configurações de Descoberta. Se você selecionar "Linha do tempo local", o "Acesso a linhas do tempo de publicações locais" precisa estar definido como "Todes" nas Configurações de Descoberta.
        mascot: Substitui a ilustração na interface web avançada.
        media_cache_retention_period: Arquivos de mídia de publicações remotas são armazenados em cache no seu servidor. Quando o valor é positivo, a mídia será excluída após o número especificado de dias. Se os dados da mídia forem solicitados depois de excluídos, eles serão baixados novamente, se o conteúdo fonte ainda estiver disponível. Devido a restrições de quantas vezes os cartões de visualização de links sondam sites de terceires, recomenda-se definir este valor em pelo menos 14 dias, ou pré-visualização de links não serão atualizadas a pedido antes desse tempo.
        min_age: Es usuáries precisarão confirmar suas datas de nascimento no cadastro
        peers_api_enabled: Uma lista de nomes de domínio que este servidor encontrou no fediverso. Nenhum dado é incluído aqui sobre se você concorda com os padrões operacionais de um determinado servidor, apenas que o seu servidor sabe disso. Esta ferramenta é utilizada por serviços que recolhem estatísticas sob as normas da federação, em termos gerais.
        profile_directory: O diretório de perfis lista todes es usuáries que optaram por permitir que suas contas sejam descobertas.
        require_invite_text: 'Quando o cadastro de novas contas exigir aprovação manual, tornar obrigatório, ao invés de opcional, o texto de solicitação de convite: "Por que você deseja ingressar nessa comunidade?"'
