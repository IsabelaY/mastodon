        bot: Sinaliza aes outres que essa conta executa principalmente ações automatizadas e pode não ser monitorada
        context: Um ou mais contextos onde o filtro deve atuar
        current_password: Para fins de segurança, digite a senha da conta atual
        current_username: Para confirmar, entre com o nome da conta atual
